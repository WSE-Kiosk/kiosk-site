<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WSE Kiosk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="screensaver" onclick="hideScreensaver()">
    <img src="images/screensaver.jpg" alt="Screensaver">
  </div>

  <div id="mainContent" style="display: none;">

    <section id="socialSection" class="social-section">
      <h2>Follow Us on Socials</h2>

      <div class="social-icons">
        <a
          href="#"
          class="social-link"
          aria-label="Follow WSE on Facebook"
          onclick="showImage('images/WSE-FB-QR.jpg', 'Follow WSE on Facebook'); return false;">
          <img src="images/fb-logo.png" alt="Facebook">
        </a>

        <a
          href="#"
          class="social-link"
          aria-label="Follow WSE on Instagram"
          onclick="showImage('images/wse-insta-qr.jpg', 'Follow WSE on Instagram'); return false;">
          <img src="images/insta-wse-logo.png" alt="WSE Instagram">
        </a>

        <a
          href="#"
          class="social-link"
          aria-label="Follow English Study Camps on Instagram"
          onclick="showImage('images/esc-insta-qr.jpg', 'Follow English Study Camps on Instagram'); return false;">
          <img src="images/insta-esc-logo.png" alt="English Study Camps Instagram">
        </a>

        <a
          href="#"
          class="social-link"
          aria-label="Follow WSE on LinkedIn"
          onclick="showImage('images/wse-linkedin-qr.jpg', 'Follow WSE on LinkedIn'); return false;">
          <img src="images/linkedin-logo.png" alt="LinkedIn">
        </a>

        <a
          href="#"
          class="social-link"
          aria-label="Follow WSE on TikTok"
          onclick="showImage('images/wse-tiktok-qr.jpg', 'Follow WSE on TikTok'); return false;">
          <img src="images/tiktok-logo.png" alt="TikTok">
        </a>

        <a
          href="#"
          class="social-link"
          aria-label="Follow WSE on YouTube"
          onclick="showImage('images/wse-youtube-qr.jpg', 'Follow WSE on YouTube'); return false;">
          <img src="images/youtube-logo.png" alt="YouTube">
        </a>

        <a
          href="#"
          class="social-link"
          aria-label="Review WSE on Google"
          onclick="showImage('images/wse-google-qr.jpg', 'Review WSE on Google'); return false;">
          <img src="images/Google-logo.png" alt="Google">
        </a>
      </div>
    </section>

    <header>WSE Services</header>

    <div class="container" id="servicesMenu">

      <button type="button" onclick="go('https://ask-wse.zapier.app')">
        <span class="icon">🤖</span> Ask WSE (Chatbot)
      </button>

      <button type="button" onclick="go('https://elsieapp.typeform.com/to/UbV5d0dy')">
        <span class="icon">🌴</span> Book a Holiday / Extend Course
      </button>

      <button type="button" onclick="go('https://2dmuxe.share-eu1.hsforms.com/2g5oFMpnQR3uLQE_J6Oow1Q')">
        <span class="icon">📞</span> Contact Sales Team
      </button>

      <button type="button" onclick="showImage('images/wse-app.jpeg', 'WSE App')">
        <span class="icon">📱</span> WSE App
      </button>

      <button type="button" onclick="go('https://wimbledon-school.ac.uk/')">
        <span class="icon">🏫</span> WSE Homepage
      </button>

      <button type="button" onclick="go('https://www.englishstudycamps.co.uk/')">
        <span class="icon">🌍</span> English Study Camps
      </button>

    </div>

    <header>Travel & Activities in London</header>

    <div class="container" id="travelMenu">

      <button type="button" onclick="go('https://wimbledon-school.ac.uk/school/social-programme')">
        <span class="icon">🎉</span> WSE Social Programme
      </button>

      <button type="button" onclick="go('https://www.google.co.uk')">
        <span class="icon">🔍</span> Google
      </button>

      <button type="button" onclick="go('https://www.google.com/maps')">
        <span class="icon">🗺️</span> Google Maps
      </button>

      <button type="button" onclick="go('https://tfl.gov.uk/plan-a-journey/')">
        <span class="icon">🚇</span> TfL Journey Planner
      </button>

      <button type="button" onclick="go('https://citymapper.com/?lang=en')">
        <span class="icon">📍</span> Citymapper
      </button>

      <button type="button" onclick="go('https://www.timeout.com/london')">
        <span class="icon">🎭</span> TimeOut London
      </button>

      <button type="button" onclick="go('https://lovewimbledon.org/')">
        <span class="icon">❤️</span> Love Wimbledon
      </button>

      <button type="button" onclick="go('https://limebike.app.link/LimeWebsiteAppDownloadMM')">
        <span class="icon">🚲</span> Lime Bikes
      </button>

      <button type="button" onclick="go('https://cyclesaver.co.uk/forest')">
        <span class="icon">🌳</span> Forest Bikes
      </button>

      <button type="button" onclick="go('https://airporttransfer.com/?affiliate=AT-VLNJASDYCZZP&utm_source=marketing&utm_medium=tpc&utm_campaign=affiliate')">
        <span class="icon">✈️</span> Airport Transfer
      </button>

      <button type="button" onclick="go('https://skyscanner.pxf.io/JzO6vN')">
        <span class="icon">🛫</span> Flights (Skyscanner)
      </button>

      <button type="button" onclick="go('https://www.uber.com/gb/en/download/')">
        <span class="icon">🚕</span> Uber
      </button>

    </div>

  </div>

  <div id="imageView" style="display: none;">
    <img id="displayImage" src="" alt="">
  </div>

  <button id="homeBtn" type="button" onclick="goHome()">🏠 Home</button>

  <script>
    let timer;
    const timeout = 60000;

    const screensaver = document.getElementById('screensaver');
    const mainContent = document.getElementById('mainContent');
    const imageView = document.getElementById('imageView');
    const homeBtn = document.getElementById('homeBtn');
    const displayImage = document.getElementById('displayImage');

    function resetTimer() {
      clearTimeout(timer);
      timer = setTimeout(showScreensaver, timeout);
    }

    function showScreensaver() {
      screensaver.style.display = 'flex';
      mainContent.style.display = 'none';
      imageView.style.display = 'none';
      homeBtn.style.display = 'none';
    }

    function hideScreensaver() {
      screensaver.style.display = 'none';
      mainContent.style.display = 'block';
      imageView.style.display = 'none';
      homeBtn.style.display = 'none';
      resetTimer();
    }

    function go(url) {
      resetTimer();
      window.location.href = url;
    }

    function showImage(src, altText) {
      displayImage.src = src;
      displayImage.alt = altText;
      mainContent.style.display = 'none';
      imageView.style.display = 'block';
      homeBtn.style.display = 'block';
      resetTimer();
    }

    function goHome() {
      mainContent.style.display = 'block';
      imageView.style.display = 'none';
      homeBtn.style.display = 'none';
      resetTimer();
    }

    document.addEventListener('click', resetTimer);
    document.addEventListener('touchstart', resetTimer);

    resetTimer();
  </script>

</body>
</html>
