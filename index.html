<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WSE Kiosk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="screensaver" onclick="hideScreensaver()">
    <img src="images/screensaver.jpg" alt="Screensaver">
  </div>

  <div id="mainContent" style="display: none;">

    <section id="socialSection" class="social-section">
      <h2>Follow Us on Socials</h2>
      <div class="social-icons">
        <a href="#" onclick="showImage('images/WSE-FB-QR.jpg'); return false;"><img src="images/fb-logo.png"></a>
        <a href="#" onclick="showImage('images/wse-insta-qr.jpg'); return false;"><img src="images/insta-wse-logo.png"></a>
        <a href="#" onclick="showImage('images/esc-insta-qr.jpg'); return false;"><img src="images/insta-esc-logo.png"></a>
        <a href="#" onclick="showImage('images/wse-linkedin-qr.jpg'); return false;"><img src="images/linkedin-logo.png"></a>
        <a href="#" onclick="showImage('images/wse-tiktok-qr.jpg'); return false;"><img src="images/tiktok-logo.png"></a>
        <a href="#" onclick="showImage('images/wse-youtube-qr.jpg'); return false;"><img src="images/youtube-logo.png"></a>
        <a href="#" onclick="showImage('images/wse-google-qr.jpg'); return false;"><img src="images/Google-logo.png"></a>
      </div>
    </section>

    <header>WSE Services</header>

    <div class="container">
      <button onclick="go('https://elsieapp.typeform.com')">🌴 Holiday</button>
      <button onclick="go('https://2dmuxe.share-eu1.hsforms.com')">📞 Sales</button>
      <button onclick="showImage('images/wse-app.jpeg')">📱 App</button>
      <button onclick="go('https://wimbledon-school.ac.uk/')">🏫 Homepage</button>
      <button onclick="go('https://englishstudycamps.co.uk/')">🌍 Camps</button>
    </div>

    <header>Travel & Activities in London</header>

    <div class="container">
      <button onclick="go('https://wimbledon-school.ac.uk')">🎉 Social</button>
      <button onclick="go('https://google.com')">🔍 Google</button>
      <button onclick="go('https://maps.google.com')">🗺️ Maps</button>
      <button onclick="go('https://tfl.gov.uk')">🚇 TfL</button>
      <button onclick="go('https://citymapper.com')">📍 Citymapper</button>
      <button onclick="go('https://timeout.com')">🎭 TimeOut</button>
      <button onclick="go('https://lovewimbledon.org')">❤️ Wimbledon</button>
      <button onclick="go('https://limebike.app')">🚲 Lime</button>
      <button onclick="go('https://cyclesaver.co.uk')">🌳 Forest</button>
      <button onclick="go('https://airporttransfer.com')">✈️ Transfer</button>
      <button onclick="go('https://skyscanner.net')">🛫 Flights</button>
      <button onclick="go('https://uber.com')">🚕 Uber</button>
    </div>

    <!-- BUTTON HERE -->
    <div class="do-not-press-wrapper">
      <button onclick="showImage('images/Shocked.gif')">
        ⚠️ Do Not Press
      </button>
    </div>

  </div>

  <div id="imageView">
    <img id="displayImage">
  </div>

  <script>
    let timer;
    const timeout = 60000;

    const screensaver = document.getElementById('screensaver');
    const mainContent = document.getElementById('mainContent');
    const imageView = document.getElementById('imageView');
    const displayImage = document.getElementById('displayImage');

    function resetTimer() {
      clearTimeout(timer);
      timer = setTimeout(showScreensaver, timeout);
    }

    function showScreensaver() {
      screensaver.style.display = 'flex';
      mainContent.style.display = 'none';
      imageView.style.display = 'none';
    }

    function hideScreensaver() {
      screensaver.style.display = 'none';
      mainContent.style.display = 'block';
      resetTimer();
    }

    function go(url) {
      window.location.href = url;
    }

    function showImage(src) {
      displayImage.src = src;
      mainContent.style.display = 'none';
      imageView.style.display = 'block';
      resetTimer();
    }

    document.addEventListener('click', resetTimer);
    document.addEventListener('touchstart', resetTimer);

    resetTimer();
  </script>

</body>
</html>
