<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WSE Kiosk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="screensaver" onclick="hideScreensaver()">
    <img src="images/screensaver.jpg" alt="Screensaver">
  </div>

  <div id="mainContent" style="display: none;">

    <section id="socialSection" class="social-section">
      <h2>Follow Us on Socials</h2>

      <div class="social-icons">
        <a href="#" class="social-link" onclick="showImage('images/WSE-FB-QR.jpg'); return false;">
          <img src="images/fb-logo.png">
        </a>

        <a href="#" class="social-link" onclick="showImage('images/wse-insta-qr.jpg'); return false;">
          <img src="images/insta-wse-logo.png">
        </a>

        <a href="#" class="social-link" onclick="showImage('images/esc-insta-qr.jpg'); return false;">
          <img src="images/insta-esc-logo.png">
        </a>

        <a href="#" class="social-link" onclick="showImage('images/wse-linkedin-qr.jpg'); return false;">
          <img src="images/linkedin-logo.png">
        </a>

        <a href="#" class="social-link" onclick="showImage('images/wse-tiktok-qr.jpg'); return false;">
          <img src="images/tiktok-logo.png">
        </a>

        <a href="#" class="social-link" onclick="showImage('images/wse-youtube-qr.jpg'); return false;">
          <img src="images/youtube-logo.png">
        </a>

        <a href="#" class="social-link" onclick="showImage('images/wse-google-qr.jpg'); return false;">
          <img src="images/Google-logo.png">
        </a>
      </div>
    </section>

    <header>WSE Services</header>

    <div class="container" id="servicesMenu">
      <button onclick="go('https://elsieapp.typeform.com/to/UbV5d0dy')">🌴<span class="label">Holiday</span></button>
      <button onclick="go('https://2dmuxe.share-eu1.hsforms.com/2g5oFMpnQR3uLQE_J6Oow1Q')">📞<span class="label">Sales</span></button>
      <button onclick="showImage('images/wse-app.jpeg')">📱<span class="label">App</span></button>
      <button onclick="go('https://wimbledon-school.ac.uk/')">🏫<span class="label">Homepage</span></button>
      <button onclick="go('https://www.englishstudycamps.co.uk/')">🌍<span class="label">Camps</span></button>
    </div>

    <header>Travel & Activities in London</header>

    <div class="container" id="travelMenu">
      <button onclick="go('https://wimbledon-school.ac.uk/school/social-programme')">🎉<span class="label">Social</span></button>
      <button onclick="go('https://www.google.com')">🔍<span class="label">Google</span></button>
      <button onclick="go('https://www.google.com/maps')">🗺️<span class="label">Maps</span></button>
      <button onclick="go('https://tfl.gov.uk')">🚇<span class="label">TfL</span></button>
      <button onclick="go('https://citymapper.com')">📍<span class="label">Citymapper</span></button>
      <button onclick="go('https://www.timeout.com/london')">🎭<span class="label">TimeOut</span></button>
      <button onclick="go('https://lovewimbledon.org')">❤️<span class="label">Wimbledon</span></button>
      <button onclick="go('https://limebike.app.link')">🚲<span class="label">Lime</span></button>
      <button onclick="go('https://cyclesaver.co.uk')">🌳<span class="label">Forest</span></button>
      <button onclick="go('https://airporttransfer.com')">✈️<span class="label">Transfer</span></button>
      <button onclick="go('https://skyscanner.net')">🛫<span class="label">Flights</span></button>
      <button onclick="go('https://uber.com')">🚕<span class="label">Uber</span></button>
    </div>

    <!-- 👇 BUTTON HERE -->
    <div class="do-not-press-wrapper">
      <button id="doNotPressBtn" onclick="showImage('images/Shocked.gif')">
        ⚠️ Do Not Press
      </button>
    </div>

  </div>

  <div id="imageView">
    <img id="displayImage">
  </div>

  <button id="homeBtn" onclick="goHome()">🏠 Home</button>

  <script>
    let timer;
    const timeout = 60000;

    const screensaver = document.getElementById('screensaver');
    const mainContent = document.getElementById('mainContent');
    const imageView = document.getElementById('imageView');
    const displayImage = document.getElementById('displayImage');

    function resetTimer() {
      clearTimeout(timer);
      timer = setTimeout(showScreensaver, timeout);
    }

    function showScreensaver() {
      screensaver.style.display = 'flex';
      mainContent.style.display = 'none';
      imageView.style.display = 'none';
    }

    function hideScreensaver() {
      screensaver.style.display = 'none';
      mainContent.style.display = 'block';
      resetTimer();
    }

    function go(url) {
      window.location.href = url;
    }

    function showImage(src) {
      displayImage.src = src;
      mainContent.style.display = 'none';
      imageView.style.display = 'block';
      resetTimer();
    }

    function goHome() {
      imageView.style.display = 'none';
      mainContent.style.display = 'block';
      resetTimer();
    }

    document.addEventListener('click', resetTimer);
    document.addEventListener('touchstart', resetTimer);

    resetTimer();
  </script>

</body>
</html>
